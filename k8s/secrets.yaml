# ⚠️  TEMPLATE ONLY — Do NOT commit this file with real values.
# Fill in base64-encoded values:
#   echo -n 'your_value' | base64
# Then apply: kubectl apply -f k8s/secrets.yaml

apiVersion: v1
kind: Secret
metadata:
  name: moniqofi-secrets
  namespace: moniqofi
type: Opaque
data:
  DATABASE_URL: <base64_encoded_postgres_url>
  JWT_SECRET: <base64_encoded_jwt_secret>
  EMAIL_USER: <base64_encoded_email>
  EMAIL_PASS: <base64_encoded_email_password>
  GROQ_API_KEY: <base64_encoded_groq_key>
  PLAID_CLIENT_ID: <base64_encoded_plaid_client_id>
  PLAID_SECRET: <base64_encoded_plaid_secret>
