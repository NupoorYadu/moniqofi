# Requires nginx ingress controller:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
#
# Replace hostnames with your domain.
# For TLS, use cert-manager: https://cert-manager.io/docs/

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: moniqofi-ingress
  namespace: moniqofi
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Uncomment for TLS with cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # Uncomment and configure for TLS:
  # tls:
  #   - hosts:
  #       - moniqofi.yourdomain.com
  #       - api.moniqofi.yourdomain.com
  #     secretName: moniqofi-tls
  rules:
    - host: moniqofi.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
    - host: api.moniqofi.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
